<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가계부</title>
<style>
  :root {
    --bg: #F0EDE8;
    --surface: #FFFFFF;
    --border: #D8D3C8;
    --text: #1E1C19;
    --text-sub: #6B6760;
    --text-light: #A8A49C;
    --accent-in: #2EAA8A;
    --accent-out: #E05A30;
    --accent-waste: #D4A017;
    --accent-in-bg: #E8F7F3;
    --accent-out-bg: #FDF0EB;
    --radius: 14px;
    --radius-sm: 9px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── 헤더 ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 6px rgba(0,0,0,.06);
  }
  .header h1 { font-size: 17px; font-weight: 800; letter-spacing: -0.5px; }
  .header-actions { display: flex; gap: 8px; }
  .hdr-btn {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 6px 12px;
    font-size: 12px; cursor: pointer; color: var(--text-sub);
    font-weight: 600; transition: background .1s;
  }
  .hdr-btn:hover { background: var(--border); }

  /* ── 탭 (수입/지출) ── */
  .tab-bar {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    flex: 1; padding: 13px; border: none; background: none;
    font-size: 14px; font-weight: 700; color: var(--text-light);
    cursor: pointer; border-bottom: 3px solid transparent; transition: all .15s;
  }
  .tab-btn.active-in  { color: var(--accent-in);  border-bottom-color: var(--accent-in); }
  .tab-btn.active-out { color: var(--accent-out); border-bottom-color: var(--accent-out); }

  /* ── 기간 네비게이션 ── */
  .period-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .nav-arrow {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 50%; width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px; color: var(--text-sub);
    transition: background .1s;
  }
  .nav-arrow:hover { background: var(--border); }
  .period-label { font-size: 15px; font-weight: 700; }

  .view-toggle {
    display: flex; gap: 3px;
    background: var(--bg); border-radius: var(--radius-sm);
    padding: 3px; border: 1px solid var(--border);
  }
  .view-btn {
    background: none; border: none; cursor: pointer;
    padding: 5px 13px; border-radius: 7px; font-size: 12px;
    color: var(--text-sub); font-weight: 600; transition: all .15s;
  }
  .view-btn.active {
    background: var(--surface); color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,.1);
  }

  /* ── 요약 카드 ── */
  .summary-wrap {
    padding: 14px 14px 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 9px;
  }
  .summary-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 16px;
    border: 1px solid var(--border);
  }
  .summary-card.full { grid-column: 1/-1; }
  .summary-card.card-in  { border-left: 4px solid var(--accent-in); }
  .summary-card.card-out { border-left: 4px solid var(--accent-out); }
  .summary-card.card-net { border-left: 4px solid var(--text-light); }
  .summary-card .label {
    font-size: 10px; color: var(--text-sub); font-weight: 700;
    text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px;
  }
  .summary-card .amount { font-size: 21px; font-weight: 800; letter-spacing: -0.5px; }
  .amount-in    { color: var(--accent-in); }
  .amount-out   { color: var(--accent-out); }
  .amount-net-pos { color: var(--accent-in); }
  .amount-net-neg { color: var(--accent-out); }
  .amount-waste   { color: var(--accent-waste); }

  /* ── 차트 영역 ── */
  .chart-section {
    padding: 10px 14px 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 9px;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 13px;
  }
  .chart-card h3 { font-size: 11px; color: var(--text-sub); margin-bottom: 11px; font-weight: 700; letter-spacing: .3px; }
  .chart-container { display: flex; flex-direction: column; align-items: center; }
  .chart-canvas { display: block; }
  .chart-legend { width: 100%; margin-top: 9px; }
  .legend-item {
    display: flex; align-items: center;
    padding: 3px 0; font-size: 11px;
  }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; }
  .legend-name { flex: 1; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .legend-pct  { color: var(--text-light); margin-left: 4px; font-weight: 600; }

  /* ── 거래 목록 ── */
  .list-section { padding: 10px 14px 20px; }
  .day-group { margin-bottom: 10px; }
  .day-header {
    font-size: 11px; color: var(--text-sub); font-weight: 700;
    padding: 8px 4px 6px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border);
    letter-spacing: .2px;
  }
  .day-sum { font-size: 11px; }

  .tx-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 13px;
    margin-top: 6px;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; transition: box-shadow .12s, transform .1s;
  }
  .tx-item:hover { box-shadow: 0 3px 10px rgba(0,0,0,.09); transform: translateY(-1px); }
  .tx-cat-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
  .tx-info { flex: 1; min-width: 0; }
  .tx-memo { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-sub  { font-size: 11px; color: var(--text-light); margin-top: 2px; }
  .tx-right { text-align: right; flex-shrink: 0; }
  .tx-amount { font-size: 14px; font-weight: 800; }
  .tx-waste-badge {
    display: inline-block; font-size: 9px; padding: 1px 5px;
    background: #FFF3CC; color: var(--accent-waste);
    border-radius: 4px; font-weight: 700; margin-top: 3px;
    border: 1px solid #F0D060;
  }

  /* ── 회고 섹션 ── */
  .retrospect-section {
    margin: 10px 14px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .retrospect-title {
    font-size: 13px; font-weight: 800; color: var(--text);
    margin-bottom: 14px; display: flex; align-items: center; gap: 6px;
  }
  .retro-item { margin-bottom: 12px; }
  .retro-label {
    font-size: 11px; font-weight: 700; color: var(--text-sub);
    margin-bottom: 5px; display: flex; align-items: center; gap: 5px;
  }
  .retro-dot { width: 7px; height: 7px; border-radius: 50%; }
  .retro-textarea {
    width: 100%; min-height: 62px; padding: 9px 11px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--bg); color: var(--text); font-size: 13px;
    font-family: inherit; resize: vertical; outline: none;
    transition: border-color .15s; line-height: 1.6;
  }
  .retro-textarea:focus { border-color: var(--text-sub); }
  .retro-save-btn {
    width: 100%; padding: 10px; background: var(--text);
    color: #fff; border: none; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 700; cursor: pointer;
    transition: opacity .15s; margin-top: 4px;
  }
  .retro-save-btn:hover { opacity: .85; }
  .retro-saved { font-size: 11px; color: var(--accent-in); text-align: right; margin-top: 6px; display: none; }

  /* ── 빈 상태 ── */
  .empty-state {
    text-align: center; padding: 44px 20px;
    color: var(--text-light); font-size: 13px; line-height: 1.8;
  }
  .empty-state .icon { font-size: 34px; margin-bottom: 10px; }

  /* ── FAB ── */
  .fab {
    position: fixed; bottom: 24px; right: 20px;
    width: 54px; height: 54px; border-radius: 50%;
    background: var(--accent-out); color: #fff;
    border: none; cursor: pointer; font-size: 26px;
    box-shadow: 0 4px 18px rgba(224,90,48,.45);
    display: flex; align-items: center; justify-content: center;
    transition: transform .1s, box-shadow .1s;
    z-index: 200;
  }
  .fab:hover  { box-shadow: 0 6px 22px rgba(224,90,48,.55); }
  .fab:active { transform: scale(.92); }

  /* ══ 모달 공통 ══ */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.42); z-index: 300;
    align-items: center; justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    width: 100%; max-width: 420px;
    padding: 22px;
    max-height: 90vh; overflow-y: auto;
    animation: popIn .18s ease;
    box-shadow: 0 12px 40px rgba(0,0,0,.18);
  }
  @keyframes popIn {
    from { transform: scale(.94) translateY(8px); opacity: 0; }
    to   { transform: scale(1)   translateY(0);   opacity: 1; }
  }
  .modal-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 18px;
  }
  .modal-title { font-size: 16px; font-weight: 800; }
  .modal-close {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 50%; width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px; color: var(--text-sub);
    transition: background .1s;
  }
  .modal-close:hover { background: var(--border); }

  /* ── 폼 ── */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 11px; color: var(--text-sub); font-weight: 700; margin-bottom: 6px; display: block; letter-spacing: .3px; }
  .form-input, .form-select {
    width: 100%; padding: 10px 12px;
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    background: var(--bg); color: var(--text); font-size: 14px;
    outline: none; transition: border-color .15s;
    font-family: inherit;
  }
  .form-input:focus, .form-select:focus { border-color: var(--text); }

  .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .type-btn {
    padding: 11px; border: 2px solid var(--border);
    border-radius: var(--radius-sm); background: none;
    font-size: 14px; font-weight: 700; cursor: pointer; transition: all .15s;
    color: var(--text-sub);
  }
  .type-btn.active-in  { border-color: var(--accent-in);  color: var(--accent-in);  background: var(--accent-in-bg); }
  .type-btn.active-out { border-color: var(--accent-out); color: var(--accent-out); background: var(--accent-out-bg); }

  .waste-row {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px; background: #FFF9E8;
    border-radius: var(--radius-sm); cursor: pointer;
    border: 1px solid #F0D88A;
  }
  .waste-check { width: 16px; height: 16px; accent-color: var(--accent-waste); cursor: pointer; }
  .waste-label { font-size: 13px; color: #7A6010; user-select: none; font-weight: 600; }

  .btn-primary {
    width: 100%; padding: 13px; border: none;
    border-radius: var(--radius-sm); font-size: 15px; font-weight: 800;
    cursor: pointer; transition: opacity .15s, transform .1s;
    letter-spacing: -.2px;
  }
  .btn-primary:hover  { opacity: .88; }
  .btn-primary:active { transform: scale(.98); }
  .btn-primary.btn-in  { background: var(--accent-in);  color: #fff; box-shadow: 0 3px 12px rgba(46,170,138,.35); }
  .btn-primary.btn-out { background: var(--accent-out); color: #fff; box-shadow: 0 3px 12px rgba(224,90,48,.35); }

  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-secondary {
    padding: 12px; border: 1.5px solid var(--border);
    background: none; border-radius: var(--radius-sm);
    font-size: 14px; color: var(--text-sub); cursor: pointer;
    font-weight: 600; transition: background .12s;
  }
  .btn-secondary:hover { background: var(--bg); }
  .btn-danger {
    padding: 12px; border: 1.5px solid #F0B0A0;
    background: #FDF0EB; border-radius: var(--radius-sm);
    font-size: 14px; color: var(--accent-out); cursor: pointer; font-weight: 700;
    transition: background .12s;
  }
  .btn-danger:hover { background: #FAE0D8; }

  /* ── 결제수단 칩 ── */
  .pay-chips {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px;
  }
  .pay-chip {
    padding: 5px 11px; border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--bg); color: var(--text-sub);
    font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all .12s;
  }
  .pay-chip.selected { border-color: var(--accent-out); color: var(--accent-out); background: var(--accent-out-bg); }
  .pay-chip-add {
    padding: 5px 11px; border-radius: 20px;
    border: 1.5px dashed var(--border);
    background: none; color: var(--text-light);
    font-size: 12px; cursor: pointer; transition: all .12s;
  }
  .pay-chip-add:hover { border-color: var(--text-sub); color: var(--text-sub); }

  /* ── 카테고리 설정 ── */
  .cat-list { margin-bottom: 14px; }
  .cat-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 0; border-bottom: 1px solid var(--border);
  }
  .cat-color-btn {
    width: 26px; height: 26px; border-radius: 50%; border: 2px solid rgba(0,0,0,.1);
    cursor: pointer; flex-shrink: 0;
  }
  .cat-name-input {
    flex: 1; padding: 6px 9px;
    border: 1.5px solid var(--border); border-radius: 7px;
    background: var(--bg); font-size: 13px; color: var(--text);
    font-family: inherit; outline: none;
  }
  .cat-del-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-light); font-size: 15px; padding: 3px 5px;
    transition: color .1s;
  }
  .cat-del-btn:hover { color: var(--accent-out); }
  .color-picker-hidden { position: absolute; opacity: 0; width: 0; height: 0; }

  /* ── 상세 ── */
  .detail-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px;
  }
  .detail-row .key { color: var(--text-sub); font-size: 12px; font-weight: 600; }
  .detail-row .val { font-weight: 600; }

  /* 결제수단 설정 모달 */
  .pay-item {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 0; border-bottom: 1px solid var(--border);
  }
  .pay-name-input {
    flex: 1; padding: 7px 10px;
    border: 1.5px solid var(--border); border-radius: 7px;
    background: var(--bg); font-size: 13px; color: var(--text);
    font-family: inherit; outline: none;
  }
  .pay-del-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-light); font-size: 15px; padding: 3px 5px;
  }
  .pay-del-btn:hover { color: var(--accent-out); }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <h1>📒 가계부</h1>
  <div class="header-actions">
    <button class="hdr-btn" onclick="openPayModal()">결제수단</button>
    <button class="hdr-btn" onclick="openCatModal()">카테고리</button>
  </div>
</div>

<!-- 탭 -->
<div class="tab-bar">
  <button class="tab-btn active-out" id="tab-out" onclick="switchMode('out')">지출</button>
  <button class="tab-btn" id="tab-in"  onclick="switchMode('in')">수입</button>
</div>

<!-- 기간 네비게이션 -->
<div class="period-nav">
  <button class="nav-arrow" onclick="movePeriod(-1)">&#8249;</button>
  <span class="period-label" id="periodLabel">–</span>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="view-toggle">
      <button class="view-btn" id="vw-week" onclick="switchView('week')">주간</button>
      <button class="view-btn active" id="vw-month" onclick="switchView('month')">월간</button>
    </div>
    <button class="nav-arrow" onclick="movePeriod(1)">&#8250;</button>
  </div>
</div>

<!-- 요약 카드 -->
<div class="summary-wrap">
  <div class="summary-card card-in">
    <div class="label">수입</div>
    <div class="amount amount-in" id="sumIn">₩0</div>
  </div>
  <div class="summary-card card-out">
    <div class="label">지출</div>
    <div class="amount amount-out" id="sumOut">₩0</div>
  </div>
  <div class="summary-card full card-net" style="display:flex;justify-content:space-between;align-items:center;">
    <div>
      <div class="label">순수지</div>
      <div class="amount" id="sumNet">₩0</div>
    </div>
    <div style="text-align:right;">
      <div class="label">낭비 지출</div>
      <div class="amount amount-waste" style="font-size:18px;" id="sumWaste">₩0</div>
    </div>
  </div>
</div>

<!-- 차트 -->
<div class="chart-section">
  <div class="chart-card">
    <h3>수입 분포</h3>
    <div class="chart-container">
      <canvas class="chart-canvas" id="chartIn" width="130" height="130"></canvas>
      <div class="chart-legend" id="legendIn"></div>
    </div>
  </div>
  <div class="chart-card">
    <h3>지출 분포</h3>
    <div class="chart-container">
      <canvas class="chart-canvas" id="chartOut" width="130" height="130"></canvas>
      <div class="chart-legend" id="legendOut"></div>
    </div>
  </div>
</div>

<!-- 거래 목록 -->
<div class="list-section" id="listSection"></div>

<!-- 회고 섹션 -->
<div class="retrospect-section" id="retroSection">
  <div class="retrospect-title">✍️ 이달의 회고</div>
  <div class="retro-item">
    <div class="retro-label">
      <span class="retro-dot" style="background:#2EAA8A"></span>잘한 점
    </div>
    <textarea class="retro-textarea" id="retroGood" placeholder="이번 달 잘 지킨 소비 습관을 기록해 보세요."></textarea>
  </div>
  <div class="retro-item">
    <div class="retro-label">
      <span class="retro-dot" style="background:#E05A30"></span>개선할 점
    </div>
    <textarea class="retro-textarea" id="retroBad" placeholder="아쉬웠던 소비나 개선하고 싶은 점을 적어보세요."></textarea>
  </div>
  <div class="retro-item" style="margin-bottom:8px;">
    <div class="retro-label">
      <span class="retro-dot" style="background:#D4A017"></span>다음 달 목표
    </div>
    <textarea class="retro-textarea" id="retroNext" placeholder="다음 달에 도전할 목표 금액이나 습관을 써보세요."></textarea>
  </div>
  <button class="retro-save-btn" onclick="saveRetro()">저장</button>
  <div class="retro-saved" id="retroSaved">✓ 저장되었습니다</div>
</div>

<!-- FAB -->
<button class="fab" onclick="openAddModal()">+</button>

<!-- ══ 모달: 거래 추가/수정 ══ -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="addModalTitle">거래 추가</span>
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>

    <div class="form-group">
      <label class="form-label">유형</label>
      <div class="type-toggle">
        <button class="type-btn active-out" id="typeOut" onclick="setFormType('out')">지출</button>
        <button class="type-btn" id="typeIn" onclick="setFormType('in')">수입</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">날짜</label>
      <input type="date" class="form-input" id="fDate">
    </div>

    <div class="form-group">
      <label class="form-label">금액 (원)</label>
      <input type="number" class="form-input" id="fAmount" placeholder="0" min="0" inputmode="numeric">
    </div>

    <div class="form-group">
      <label class="form-label">카테고리</label>
      <select class="form-select" id="fCat"></select>
    </div>

    <div class="form-group">
      <label class="form-label">결제수단</label>
      <div class="pay-chips" id="formPayChips"></div>
    </div>

    <div class="form-group">
      <label class="form-label">메모</label>
      <input type="text" class="form-input" id="fMemo" placeholder="내용을 입력하세요">
    </div>

    <div class="form-group" id="wasteRow">
      <label class="waste-row" for="fWaste">
        <input type="checkbox" class="waste-check" id="fWaste">
        <span class="waste-label">🚨 낭비 지출로 표시</span>
      </label>
    </div>

    <div id="addModalBtns">
      <button class="btn-primary btn-out" id="submitBtn" onclick="submitTx()">저장</button>
    </div>
  </div>
</div>

<!-- ══ 모달: 거래 상세 ══ -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">거래 상세</span>
      <button class="modal-close" onclick="closeDetailModal()">✕</button>
    </div>
    <div id="detailContent"></div>
    <div class="btn-row" style="margin-top:18px;">
      <button class="btn-danger" onclick="deleteTx()">삭제</button>
      <button class="btn-secondary" onclick="editTx()">수정</button>
    </div>
  </div>
</div>

<!-- ══ 모달: 카테고리 설정 ══ -->
<div class="modal-overlay" id="catModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">카테고리 설정</span>
      <button class="modal-close" onclick="closeCatModal()">✕</button>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:14px;">
      <button class="view-btn active" id="catTabOut" style="flex:1;padding:8px;border-radius:var(--radius-sm);border:1.5px solid var(--border);" onclick="switchCatTab('out')">지출</button>
      <button class="view-btn" id="catTabIn" style="flex:1;padding:8px;border-radius:var(--radius-sm);border:1.5px solid var(--border);" onclick="switchCatTab('in')">수입</button>
    </div>
    <div class="cat-list" id="catList"></div>
    <button class="btn-secondary" style="width:100%;margin-bottom:12px;" onclick="addCat()">+ 카테고리 추가</button>
    <button class="btn-primary btn-out" onclick="saveCats()">저장</button>
  </div>
</div>

<!-- ══ 모달: 결제수단 설정 ══ -->
<div class="modal-overlay" id="payModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">결제수단 설정</span>
      <button class="modal-close" onclick="closePayModal()">✕</button>
    </div>
    <div id="payList"></div>
    <button class="btn-secondary" style="width:100%;margin-bottom:12px;" onclick="addPay()">+ 결제수단 추가</button>
    <button class="btn-primary btn-out" onclick="savePays()">저장</button>
  </div>
</div>

<script>
// ══ 기본 데이터 ══
const DEFAULT_CATS = {
  out: [
    { id:'c1',  name:'식비',       color:'#E05A30' },
    { id:'c2',  name:'교통',       color:'#2EAA8A' },
    { id:'c3',  name:'주거·통신',  color:'#3A8FD4' },
    { id:'c4',  name:'문화·여가',  color:'#9B59B6' },
    { id:'c5',  name:'의료',       color:'#E91E8C' },
    { id:'c6',  name:'쇼핑',       color:'#D4A017' },
    { id:'c7',  name:'반려견',     color:'#27AE60' },
    { id:'c8',  name:'소비성적금', color:'#E67E22' },
    { id:'c9',  name:'예적금·청약',color:'#2980B9' },
    { id:'c10', name:'보험·연금',  color:'#8E44AD' },
    { id:'c11', name:'기타',       color:'#95A5A6' },
  ],
  in: [
    { id:'i1', name:'급여',  color:'#2EAA8A' },
    { id:'i2', name:'부업',  color:'#3A8FD4' },
    { id:'i3', name:'기타',  color:'#95A5A6' },
  ]
};

const DEFAULT_PAYS = ['현금','신용카드','체크카드','계좌이체'];

// ══ 상태 ══
let mode = 'out';
let view = 'month';
let anchor = new Date();
let transactions = [];
let cats = { out: [], in: [] };
let pays = [];
let catTab = 'out';
let editingId = null;
let detailId  = null;
let formPaySelected = null;
let editPays = [];

// ══ 초기화 ══
function init() {
  cats  = JSON.parse(localStorage.getItem('kakeibo_cats')  || 'null') || JSON.parse(JSON.stringify(DEFAULT_CATS));
  pays  = JSON.parse(localStorage.getItem('kakeibo_pays')  || 'null') || [...DEFAULT_PAYS];
  transactions = JSON.parse(localStorage.getItem('kakeibo_tx') || '[]');
  loadRetro();
  render();
}

function save() {
  localStorage.setItem('kakeibo_tx',   JSON.stringify(transactions));
  localStorage.setItem('kakeibo_cats', JSON.stringify(cats));
  localStorage.setItem('kakeibo_pays', JSON.stringify(pays));
}

// ══ 기간 헬퍼 ══
function getMonday(d) {
  const dt = new Date(d), day = dt.getDay();
  dt.setDate(dt.getDate() + (day === 0 ? -6 : 1 - day));
  dt.setHours(0,0,0,0); return dt;
}
function getPeriodRange() {
  if (view === 'month') {
    const y = anchor.getFullYear(), m = anchor.getMonth();
    return { start: new Date(y,m,1), end: new Date(y,m+1,0,23,59,59) };
  }
  const mon = getMonday(anchor), sun = new Date(mon);
  sun.setDate(mon.getDate()+6); sun.setHours(23,59,59);
  return { start: mon, end: sun };
}
function getPeriodLabel() {
  const { start, end } = getPeriodRange();
  if (view === 'month') return `${start.getFullYear()}년 ${start.getMonth()+1}월`;
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  return `${start.getFullYear()}년 ${fmt(start)} – ${fmt(end)}`;
}
function movePeriod(dir) {
  if (view === 'month') anchor.setMonth(anchor.getMonth() + dir);
  else anchor.setDate(anchor.getDate() + dir * 7);
  render();
}

// ══ 필터링 ══
function filterTx() {
  const { start, end } = getPeriodRange();
  return transactions.filter(t => {
    const d = new Date(t.date+'T00:00:00');
    return d >= start && d <= end;
  });
}

function fmt(n) { return '₩' + Math.abs(n).toLocaleString('ko-KR'); }

// ══ 렌더 ══
function render() {
  document.getElementById('periodLabel').textContent = getPeriodLabel();
  renderSummary(); renderCharts(); renderList(); loadRetro();
}

function renderSummary() {
  const txs = filterTx();
  const totalIn  = txs.filter(t=>t.type==='in').reduce((s,t)=>s+t.amount,0);
  const totalOut = txs.filter(t=>t.type==='out').reduce((s,t)=>s+t.amount,0);
  const net      = totalIn - totalOut;
  const waste    = txs.filter(t=>t.type==='out'&&t.waste).reduce((s,t)=>s+t.amount,0);
  document.getElementById('sumIn').textContent  = fmt(totalIn);
  document.getElementById('sumOut').textContent = fmt(totalOut);
  const netEl = document.getElementById('sumNet');
  netEl.textContent = (net>=0?'+':'-') + fmt(net);
  netEl.className = 'amount ' + (net>=0?'amount-net-pos':'amount-net-neg');
  document.getElementById('sumWaste').textContent = fmt(waste);
}

function drawDonut(canvasId, data) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  const total = data.reduce((s,d)=>s+d.value,0);
  if (!total) {
    ctx.beginPath(); ctx.arc(W/2,H/2,W*0.38,0,Math.PI*2);
    ctx.strokeStyle='#D8D3C8'; ctx.lineWidth=W*0.17; ctx.stroke(); return;
  }
  let ang = -Math.PI/2;
  const gap = 0.03;
  data.forEach(d => {
    const sweep = (d.value/total)*Math.PI*2 - gap;
    ctx.beginPath();
    ctx.moveTo(W/2,H/2);
    ctx.arc(W/2,H/2,W*0.43,ang,ang+sweep);
    ctx.closePath();
    ctx.fillStyle = d.color; ctx.fill();
    ang += sweep + gap;
  });
  ctx.beginPath(); ctx.arc(W/2,H/2,W*0.27,0,Math.PI*2);
  ctx.fillStyle='#FFFFFF'; ctx.fill();
  ctx.fillStyle='#1E1C19';
  ctx.font=`bold ${W*0.13}px 'Apple SD Gothic Neo',sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(fmt(total),W/2,H/2);
}

function renderCharts() {
  const txs = filterTx();
  ['in','out'].forEach(type => {
    const catMap = {};
    txs.filter(t=>t.type===type).forEach(t=>{catMap[t.catId]=(catMap[t.catId]||0)+t.amount;});
    const data = cats[type].filter(c=>catMap[c.id]).map(c=>({name:c.name,color:c.color,value:catMap[c.id]})).sort((a,b)=>b.value-a.value);
    drawDonut('chart'+(type==='in'?'In':'Out'), data);
    const total = data.reduce((s,d)=>s+d.value,0);
    document.getElementById('legend'+(type==='in'?'In':'Out')).innerHTML =
      data.slice(0,5).map(d=>`<div class="legend-item">
        <span class="legend-dot" style="background:${d.color}"></span>
        <span class="legend-name">${d.name}</span>
        <span class="legend-pct">${total?Math.round(d.value/total*100):0}%</span>
      </div>`).join('');
  });
}

function renderList() {
  const txs = filterTx().sort((a,b)=>b.date.localeCompare(a.date));
  const el = document.getElementById('listSection');
  if (!txs.length) {
    el.innerHTML=`<div class="empty-state"><div class="icon">📭</div>이 기간에 거래가 없어요.<br>+ 버튼으로 추가해 보세요.</div>`;
    return;
  }
  const groups = {};
  txs.forEach(t=>{if(!groups[t.date])groups[t.date]=[];groups[t.date].push(t);});
  el.innerHTML = Object.keys(groups).sort((a,b)=>b.localeCompare(a)).map(date=>{
    const items = groups[date];
    const dayIn  = items.filter(t=>t.type==='in').reduce((s,t)=>s+t.amount,0);
    const dayOut = items.filter(t=>t.type==='out').reduce((s,t)=>s+t.amount,0);
    const [y,m,d] = date.split('-');
    const dn = ['일','월','화','수','목','금','토'][new Date(date+'T00:00:00').getDay()];
    const dayParts = [];
    if(dayIn)  dayParts.push(`<span style="color:var(--accent-in);font-weight:700">+${fmt(dayIn)}</span>`);
    if(dayOut) dayParts.push(`<span style="color:var(--accent-out);font-weight:700">-${fmt(dayOut)}</span>`);
    const rows = items.map(t=>{
      const cat = [...cats.out,...cats.in].find(c=>c.id===t.catId)||{};
      const payLabel = t.payMethod ? `<span style="color:var(--text-light)">·</span> ${t.payMethod}` : '';
      return `<div class="tx-item" onclick="openDetail('${t.id}')">
        <span class="tx-cat-dot" style="background:${cat.color||'#ccc'}"></span>
        <div class="tx-info">
          <div class="tx-memo">${t.memo||cat.name||'–'}</div>
          <div class="tx-sub">${cat.name||''}${payLabel}</div>
        </div>
        <div class="tx-right">
          <div class="tx-amount" style="color:${t.type==='in'?'var(--accent-in)':'var(--accent-out)'}">
            ${t.type==='in'?'+':'-'}${fmt(t.amount)}
          </div>
          ${t.waste?'<span class="tx-waste-badge">낭비</span>':''}
        </div>
      </div>`;
    }).join('');
    return `<div class="day-group">
      <div class="day-header">
        <span>${m}월 ${d}일 (${dn})</span>
        <span class="day-sum">${dayParts.join('&nbsp;&nbsp;')}</span>
      </div>${rows}</div>`;
  }).join('');
}

// ══ 회고 ══
function getRetroKey() { return `retro_${anchor.getFullYear()}_${anchor.getMonth()+1}`; }

function loadRetro() {
  if (view !== 'month') {
    document.getElementById('retroSection').style.display = 'none'; return;
  }
  document.getElementById('retroSection').style.display = '';
  const data = JSON.parse(localStorage.getItem(getRetroKey()) || '{}');
  document.getElementById('retroGood').value = data.good || '';
  document.getElementById('retroBad').value  = data.bad  || '';
  document.getElementById('retroNext').value = data.next || '';
  document.getElementById('retroSaved').style.display = 'none';
}

function saveRetro() {
  const data = {
    good: document.getElementById('retroGood').value,
    bad:  document.getElementById('retroBad').value,
    next: document.getElementById('retroNext').value,
  };
  localStorage.setItem(getRetroKey(), JSON.stringify(data));
  const saved = document.getElementById('retroSaved');
  saved.style.display = 'block';
  setTimeout(()=>saved.style.display='none', 2000);
}

// ══ 모드/뷰 ══
function switchMode(m) {
  mode = m;
  document.getElementById('tab-out').className = 'tab-btn'+(m==='out'?' active-out':'');
  document.getElementById('tab-in').className  = 'tab-btn'+(m==='in'?' active-in':'');
}
function switchView(v) {
  view = v;
  ['week','month'].forEach(x=>document.getElementById('vw-'+x).className='view-btn'+(x===v?' active':''));
  render();
}

// ══ 결제수단 칩 렌더 ══
function renderPayChips(selectedPay) {
  formPaySelected = selectedPay || null;
  const el = document.getElementById('formPayChips');
  el.innerHTML = pays.map(p=>`
    <button type="button" class="pay-chip ${formPaySelected===p?'selected':''}" onclick="selectPay('${p}')">${p}</button>
  `).join('') + `<button type="button" class="pay-chip-add" onclick="openPayModal()">+ 추가</button>`;
}
function selectPay(p) {
  formPaySelected = formPaySelected === p ? null : p;
  renderPayChips(formPaySelected);
}

// ══ 거래 추가 모달 ══
let formType = 'out';
function openAddModal() {
  editingId = null;
  formType = mode || 'out';
  document.getElementById('addModalTitle').textContent = '거래 추가';
  document.getElementById('fDate').value = new Date().toISOString().slice(0,10);
  document.getElementById('fAmount').value = '';
  document.getElementById('fMemo').value = '';
  document.getElementById('fWaste').checked = false;
  renderPayChips(null);
  setFormType(formType);
  document.getElementById('addModalBtns').innerHTML =
    `<button class="btn-primary ${formType==='in'?'btn-in':'btn-out'}" id="submitBtn" onclick="submitTx()">저장</button>`;
  document.getElementById('addModal').classList.add('open');
}
function closeAddModal() { document.getElementById('addModal').classList.remove('open'); }

function setFormType(t) {
  formType = t;
  document.getElementById('typeOut').className = 'type-btn'+(t==='out'?' active-out':'');
  document.getElementById('typeIn').className  = 'type-btn'+(t==='in'?' active-in':'');
  document.getElementById('wasteRow').style.display = t==='out'?'':'none';
  document.getElementById('fCat').innerHTML = cats[t].map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  const btn = document.getElementById('submitBtn');
  if(btn) btn.className=`btn-primary ${t==='in'?'btn-in':'btn-out'}`;
}

function submitTx() {
  const date   = document.getElementById('fDate').value;
  const amount = parseFloat(document.getElementById('fAmount').value);
  const catId  = document.getElementById('fCat').value;
  const memo   = document.getElementById('fMemo').value.trim();
  const waste  = formType==='out' && document.getElementById('fWaste').checked;
  const payMethod = formPaySelected || '';
  if(!date||!amount||amount<=0||!catId){alert('날짜, 금액, 카테고리를 모두 입력해 주세요.');return;}
  if(editingId) {
    const idx = transactions.findIndex(t=>t.id===editingId);
    if(idx!==-1) transactions[idx]={...transactions[idx],type:formType,date,amount,catId,memo,waste,payMethod};
  } else {
    transactions.push({id:'tx_'+Date.now(),type:formType,date,amount,catId,memo,waste,payMethod});
  }
  save(); closeAddModal(); render();
}

// ══ 상세 모달 ══
function openDetail(id) {
  detailId = id;
  const t = transactions.find(tx=>tx.id===id); if(!t)return;
  const cat = [...cats.out,...cats.in].find(c=>c.id===t.catId)||{};
  const [y,m,d] = t.date.split('-');
  document.getElementById('detailContent').innerHTML=`
    <div class="detail-row"><span class="key">유형</span>
      <span class="val" style="color:${t.type==='in'?'var(--accent-in)':'var(--accent-out)'}">${t.type==='in'?'수입':'지출'}</span></div>
    <div class="detail-row"><span class="key">날짜</span><span class="val">${y}년 ${m}월 ${d}일</span></div>
    <div class="detail-row"><span class="key">금액</span>
      <span class="val" style="color:${t.type==='in'?'var(--accent-in)':'var(--accent-out)'}">
        ${t.type==='in'?'+':'-'}${fmt(t.amount)}</span></div>
    <div class="detail-row"><span class="key">카테고리</span>
      <span class="val"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${cat.color||'#ccc'};margin-right:5px;"></span>${cat.name||'–'}</span></div>
    ${t.payMethod?`<div class="detail-row"><span class="key">결제수단</span><span class="val">${t.payMethod}</span></div>`:''}
    <div class="detail-row"><span class="key">메모</span><span class="val">${t.memo||'–'}</span></div>
    ${t.type==='out'?`<div class="detail-row"><span class="key">낭비</span>
      <span class="val" style="color:${t.waste?'var(--accent-waste)':'var(--text-light)'}">
        ${t.waste?'🚨 낭비 지출':'일반'}</span></div>`:''}
  `;
  document.getElementById('detailModal').classList.add('open');
}
function closeDetailModal(){document.getElementById('detailModal').classList.remove('open');}
function deleteTx(){
  if(!confirm('이 거래를 삭제할까요?'))return;
  transactions=transactions.filter(t=>t.id!==detailId);
  save();closeDetailModal();render();
}
function editTx(){
  const t=transactions.find(tx=>tx.id===detailId);if(!t)return;
  closeDetailModal();
  editingId=t.id; formType=t.type;
  document.getElementById('addModalTitle').textContent='거래 수정';
  document.getElementById('fDate').value=t.date;
  document.getElementById('fAmount').value=t.amount;
  document.getElementById('fMemo').value=t.memo||'';
  setFormType(t.type);
  document.getElementById('fCat').value=t.catId;
  if(t.type==='out') document.getElementById('fWaste').checked=t.waste||false;
  renderPayChips(t.payMethod||null);
  document.getElementById('addModalBtns').innerHTML=`
    <div class="btn-row">
      <button class="btn-secondary" onclick="closeAddModal()">취소</button>
      <button class="btn-primary ${t.type==='in'?'btn-in':'btn-out'}" id="submitBtn" onclick="submitTx()">저장</button>
    </div>`;
  document.getElementById('addModal').classList.add('open');
}

// ══ 카테고리 설정 ══
let editCats={};
function openCatModal(){
  editCats=JSON.parse(JSON.stringify(cats)); catTab='out';
  renderCatList(); document.getElementById('catModal').classList.add('open');
}
function closeCatModal(){document.getElementById('catModal').classList.remove('open');}
function switchCatTab(t){
  catTab=t;
  document.getElementById('catTabOut').className='view-btn'+(t==='out'?' active':'');
  document.getElementById('catTabIn').className='view-btn'+(t==='in'?' active':'');
  renderCatList();
}
function renderCatList(){
  document.getElementById('catList').innerHTML=editCats[catTab].map((c,i)=>`
    <div class="cat-item" id="catrow_${i}">
      <div style="position:relative;">
        <button class="cat-color-btn" style="background:${c.color}" onclick="triggerColorPick(${i})"></button>
        <input type="color" class="color-picker-hidden" id="cpick_${i}" value="${c.color}"
          oninput="updateCatColor(${i},this.value)">
      </div>
      <input type="text" class="cat-name-input" value="${c.name}"
        oninput="editCats['${catTab}'][${i}].name=this.value" placeholder="카테고리 이름">
      <button class="cat-del-btn" onclick="delCat(${i})">✕</button>
    </div>`).join('');
}
function triggerColorPick(i){document.getElementById('cpick_'+i).click();}
function updateCatColor(i,color){
  editCats[catTab][i].color=color;
  document.querySelector(`#catrow_${i} .cat-color-btn`).style.background=color;
}
function addCat(){
  const cols=['#E05A30','#2EAA8A','#3A8FD4','#9B59B6','#D4A017'];
  editCats[catTab].push({id:'c_'+Date.now(),name:'새 카테고리',color:cols[editCats[catTab].length%cols.length]});
  renderCatList();
}
function delCat(i){
  if(editCats[catTab].length<=1){alert('최소 1개는 유지해야 해요.');return;}
  editCats[catTab].splice(i,1); renderCatList();
}
function saveCats(){
  editCats[catTab].forEach((c,i)=>{
    const inp=document.querySelector(`#catrow_${i} .cat-name-input`);
    if(inp)c.name=inp.value.trim()||c.name;
  });
  cats=editCats; save(); closeCatModal(); render();
}

// ══ 결제수단 설정 ══
function openPayModal(){
  editPays=[...pays];
  renderPayList();
  document.getElementById('payModal').classList.add('open');
}
function closePayModal(){document.getElementById('payModal').classList.remove('open');}
function renderPayList(){
  document.getElementById('payList').innerHTML=editPays.map((p,i)=>`
    <div class="pay-item" id="payrow_${i}">
      <input type="text" class="pay-name-input" value="${p}"
        oninput="editPays[${i}]=this.value" placeholder="결제수단 이름">
      <button class="pay-del-btn" onclick="delPay(${i})">✕</button>
    </div>`).join('');
}
function addPay(){
  editPays.push('새 결제수단'); renderPayList();
}
function delPay(i){
  if(editPays.length<=1){alert('최소 1개는 유지해야 해요.');return;}
  editPays.splice(i,1); renderPayList();
}
function savePays(){
  editPays.forEach((p,i)=>{
    const inp=document.querySelector(`#payrow_${i} .pay-name-input`);
    if(inp)editPays[i]=inp.value.trim()||p;
  });
  pays=editPays.filter(p=>p.trim());
  save(); closePayModal();
  // 폼 열려있으면 칩 갱신
  if(document.getElementById('addModal').classList.contains('open'))renderPayChips(formPaySelected);
}

// ══ 오버레이 닫기 ══
['addModal','detailModal','catModal','payModal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{
    if(e.target===document.getElementById(id))document.getElementById(id).classList.remove('open');
  });
});

init();
</script>
